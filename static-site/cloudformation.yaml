AWSTemplateFormatVersion: '2010-09-09'
Description: >
  Static website hosted on S3 (private) with CloudFront CDN,
  Origin Access Control (OAC), ACM TLS certificate, and Route 53 DNS.
  No public S3 access — CloudFront is the only entry point.

# ---------------------------------------------------------------------------
# Parameters — override these at deploy time; never hardcode account-specific
# values directly in the template.
# ---------------------------------------------------------------------------
Parameters:
  DomainName:
    Type: String
    Description: "Root domain name (e.g. example.com). Must match a Route 53 hosted zone."
    Default: "example.com"

  HostedZoneId:
    Type: String
    Description: "Route 53 Hosted Zone ID for DomainName."
    Default: "Z1234567890EXAMPLE"

  # CloudFront requires ACM certificates to be in us-east-1.
  # If deploying this stack from another region, this param lets you
  # reference a pre-created certificate ARN.
  AcmCertificateArn:
    Type: String
    Description: >
      ARN of the ACM certificate for DomainName in us-east-1.
      Create with: aws acm request-certificate --domain-name example.com \
        --validation-method DNS --region us-east-1
    Default: "arn:aws:acm:us-east-1:123456789012:certificate/EXAMPLE-CERT-ID"

Resources:

  # -------------------------------------------------------------------------
  # S3 Bucket — private, versioned, encrypted at rest
  # -------------------------------------------------------------------------
  StaticSiteBucket:
    Type: AWS::S3::Bucket
    Properties:
      # BucketName is intentionally not set — let AWS generate it to avoid
      # global name collisions. Reference via !Ref / !GetAtt.
      VersioningConfiguration:
        Status: Enabled
      BucketEncryption:
        ServerSideEncryptionConfiguration:
          - ServerSideEncryptionByDefault:
              SSEAlgorithm: AES256
      # Block ALL public access — OAC handles CloudFront → S3 auth
      PublicAccessBlockConfiguration:
        BlockPublicAcls: true
        BlockPublicPolicy: true
        IgnorePublicAcls: true
        RestrictPublicBuckets: true
      Tags:
        - Key: Project
          Value: StaticSiteLab

  # -------------------------------------------------------------------------
  # Bucket Policy — allows only the CloudFront distribution to GetObject
  # -------------------------------------------------------------------------
  StaticSiteBucketPolicy:
    Type: AWS::S3::BucketPolicy
    Properties:
      Bucket: !Ref StaticSiteBucket
      PolicyDocument:
        Version: '2012-10-17'
        Statement:
          - Sid: AllowCloudFrontOACOnly
            Effect: Allow
            Principal:
              Service: cloudfront.amazonaws.com
            Action: s3:GetObject
            Resource: !Sub 'arn:aws:s3:::${StaticSiteBucket}/*'
            Condition:
              StringEquals:
                # Scope permission to THIS distribution only
                AWS:SourceArn: !Sub
                  - 'arn:aws:cloudfront::${AWS::AccountId}:distribution/${DistId}'
                  - DistId: !GetAtt CloudFrontDistribution.Id

  # -------------------------------------------------------------------------
  # Origin Access Control (OAC) — modern replacement for OAI
  # Signs requests from CloudFront to S3 using SigV4
  # -------------------------------------------------------------------------
  CloudFrontOAC:
    Type: AWS::CloudFront::OriginAccessControl
    Properties:
      OriginAccessControlConfig:
        Name: !Sub '${AWS::StackName}-oac'
        Description: 'OAC for static site S3 origin'
        OriginAccessControlOriginType: s3
        SigningBehavior: always
        SigningProtocol: sigv4

  # -------------------------------------------------------------------------
  # CloudFront Distribution
  # -------------------------------------------------------------------------
  CloudFrontDistribution:
    Type: AWS::CloudFront::Distribution
    Properties:
      DistributionConfig:
        Comment: !Sub 'Static site for ${DomainName}'
        Enabled: true
        HttpVersion: http2
        IPV6Enabled: true

        # Custom domain aliases (must match ACM cert)
        Aliases:
          - !Ref DomainName
          - !Sub 'www.${DomainName}'

        # TLS certificate (must be in us-east-1)
        ViewerCertificate:
          AcmCertificateArn: !Ref AcmCertificateArn
          SslSupportMethod: sni-only          # SNI = free; dedicated IP = $600/mo
          MinimumProtocolVersion: TLSv1.2_2021

        # Default root object served when hitting the bare domain
        DefaultRootObject: index.html

        # S3 origin — REST endpoint (not website endpoint) required for OAC
        Origins:
          - Id: S3Origin
            DomainName: !GetAtt StaticSiteBucket.RegionalDomainName
            S3OriginConfig:
              OriginAccessIdentity: ''   # Empty string = using OAC, not OAI
            OriginAccessControlId: !GetAtt CloudFrontOAC.Id

        # Default cache behavior
        DefaultCacheBehavior:
          TargetOriginId: S3Origin
          ViewerProtocolPolicy: redirect-to-https   # Force HTTPS
          CachePolicyId: 658327ea-f89d-4fab-a63d-7e88639e58f6  # CachingOptimized (AWS managed)
          Compress: true          # Gzip/Brotli at the edge — reduces bandwidth
          AllowedMethods:
            - GET
            - HEAD
          CachedMethods:
            - GET
            - HEAD

        # Custom error pages — SPA-friendly (e.g., React Router)
        CustomErrorResponses:
          - ErrorCode: 403
            ResponseCode: 200
            ResponsePagePath: /index.html
            ErrorCachingMinTTL: 10
          - ErrorCode: 404
            ResponseCode: 200
            ResponsePagePath: /index.html
            ErrorCachingMinTTL: 10

        # Logging (optional — comment out to save cost in dev)
        # Logging:
        #   Bucket: !Sub '${LogBucket}.s3.amazonaws.com'
        #   Prefix: 'cloudfront/'

        Tags:
          - Key: Project
            Value: StaticSiteLab

  # -------------------------------------------------------------------------
  # Route 53 — Alias A + AAAA records pointing to CloudFront
  # Alias records are free and required for zone apex (bare domain)
  # -------------------------------------------------------------------------
  DnsRecordApex:
    Type: AWS::Route53::RecordSet
    Properties:
      HostedZoneId: !Ref HostedZoneId
      Name: !Ref DomainName
      Type: A
      AliasTarget:
        DNSName: !GetAtt CloudFrontDistribution.DomainName
        HostedZoneId: Z2FDTNDATAQYW2   # CloudFront's fixed hosted zone ID (AWS constant)
        EvaluateTargetHealth: false

  DnsRecordApexAAAA:
    Type: AWS::Route53::RecordSet
    Properties:
      HostedZoneId: !Ref HostedZoneId
      Name: !Ref DomainName
      Type: AAAA
      AliasTarget:
        DNSName: !GetAtt CloudFrontDistribution.DomainName
        HostedZoneId: Z2FDTNDATAQYW2
        EvaluateTargetHealth: false

  DnsRecordWww:
    Type: AWS::Route53::RecordSet
    Properties:
      HostedZoneId: !Ref HostedZoneId
      Name: !Sub 'www.${DomainName}'
      Type: A
      AliasTarget:
        DNSName: !GetAtt CloudFrontDistribution.DomainName
        HostedZoneId: Z2FDTNDATAQYW2
        EvaluateTargetHealth: false

# ---------------------------------------------------------------------------
# Outputs — reference these after deployment
# ---------------------------------------------------------------------------
Outputs:
  BucketName:
    Description: 'S3 bucket name — use this to sync your site content'
    Value: !Ref StaticSiteBucket
    Export:
      Name: !Sub '${AWS::StackName}-BucketName'

  CloudFrontDomain:
    Description: 'CloudFront distribution domain (e.g. d1234abcd.cloudfront.net)'
    Value: !GetAtt CloudFrontDistribution.DomainName
    Export:
      Name: !Sub '${AWS::StackName}-CloudFrontDomain'

  CloudFrontDistributionId:
    Description: 'Distribution ID — needed to create cache invalidations'
    Value: !GetAtt CloudFrontDistribution.Id
    Export:
      Name: !Sub '${AWS::StackName}-DistributionId'

  WebsiteUrl:
    Description: 'Public website URL'
    Value: !Sub 'https://${DomainName}'
